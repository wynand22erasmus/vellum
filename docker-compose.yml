# Compatible with Docker Compose and Podman Compose (see scripts/compose.sh).
# Image names and OCI labels use VELLUM_PROJECT + VELLUM_ENV from .env (see README.md).
version: "3.8"

x-vellum-project: &vellum-project ${VELLUM_PROJECT:-vellum}
x-vellum-env: &vellum-env ${VELLUM_ENV:-development}

x-vellum-labels: &vellum-labels
  com.vellum.project: *vellum-project
  com.vellum.environment: *vellum-env
  org.opencontainers.image.title: *vellum-project

x-vellum-build-args: &vellum-build-args
  VELLUM_PROJECT: *vellum-project
  VELLUM_ENV: *vellum-env
  VELLUM_SERVICE: app

x-app-env: &app-env
  DATABASE_URL: postgresql://vellum:password@postgres:5432/vellum_db
  REDIS_URL: redis://redis:6379
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"
  MAILPIT_HOST: mailpit
  MAILPIT_PORT: "1025"

services:
  app:
    image: ${VELLUM_PROJECT:-vellum}-app:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
    labels:
      <<: *vellum-labels
      com.vellum.service: app
    env_file: .env
    environment:
      <<: *app-env
      PORT: "5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_logs:/app/logs
    depends_on:
      clamav:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    command: ["npm", "run", "dev:api"]

  worker:
    image: ${VELLUM_PROJECT:-vellum}-worker:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
        VELLUM_SERVICE: worker
    labels:
      <<: *vellum-labels
      com.vellum.service: worker
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: ["npm", "run", "worker"]
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_logs:/app/logs

  postgres:
    image: ${VELLUM_PROJECT:-vellum}-postgres:${VELLUM_ENV:-development}
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
      args:
        VELLUM_PROJECT: *vellum-project
        VELLUM_ENV: *vellum-env
    labels:
      <<: *vellum-labels
      com.vellum.service: postgres
    environment:
      POSTGRES_DB: vellum_db
      POSTGRES_USER: vellum
      POSTGRES_PASSWORD: password
      PRISMA_STUDIO_PORT: "5555"
    ports:
      - "5432:5432"
      - "${PRISMA_STUDIO_PORT:-5555}:5555"
      - "${DB_ADMIN_PORT:-8081}:8081"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma:/opt/vellum-prisma/prisma:ro
      - ./prisma.config.ts:/opt/vellum-prisma/prisma.config.ts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum -d vellum_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    labels:
      <<: *vellum-labels
      com.vellum.service: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Console subpath when embedded in the dev UI (see vite-minio-console-proxy.ts).
      MINIO_BROWSER_REDIRECT_URL: http://${VELLUM_HOST:-localhost}:8080/dev-proxy/minio-console/

  clamav:
    image: clamav/clamav:latest
    labels:
      <<: *vellum-labels
      com.vellum.service: clamav
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      retries: 10
      start_period: 120s

  mailpit:
    image: axllent/mailpit
    labels:
      <<: *vellum-labels
      com.vellum.service: mailpit
    environment:
      MP_WEBROOT: /dev-proxy/mailpit
      # Allow dev UI proxy origin when Host cannot be preserved (dev only).
      MP_API_CORS: "http://${VELLUM_HOST:-localhost}:8080,http://${VELLUM_HOST:-localhost}:5174,http://127.0.0.1:5174,http://localhost:5174"
    ports:
      - "8025:8025"
      - "1025:1025"

  web:
    image: ${VELLUM_PROJECT:-vellum}-app:${VELLUM_ENV:-development}
    labels:
      <<: *vellum-labels
      com.vellum.service: web
    env_file: .env
    environment:
      <<: *app-env
      VELLUM_API_URL: http://app:5173
    ports:
      - "5174:5174"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_healthy
    command: ["npm", "run", "dev"]

  nginx:
    image: nginx:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: nginx
    ports:
      - "8080:8080"
    environment:
      VELLUM_HOST: ${VELLUM_HOST:-localhost}
      NGINX_ENTRYPOINT_LOCAL_RESOLVERS: "1"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      app:
        condition: service_healthy
      web:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  app_node_modules:
  app_logs:
