# Compatible with Docker Compose and Podman Compose (see scripts/compose.sh).
# Image names and OCI labels use VELLUM_PROJECT + VELLUM_ENV from .env (see README.md).
version: "3.8"

x-vellum-project: &vellum-project ${VELLUM_PROJECT:-vellum}
x-vellum-env: &vellum-env ${VELLUM_ENV:-development}

x-vellum-labels: &vellum-labels
  com.vellum.project: *vellum-project
  com.vellum.environment: *vellum-env
  org.opencontainers.image.title: *vellum-project

x-vellum-build-args: &vellum-build-args
  VELLUM_PROJECT: *vellum-project
  VELLUM_ENV: *vellum-env
  VELLUM_SERVICE: app

x-app-env: &app-env
  DATABASE_URL: postgresql://vellum:password@postgres:5432/vellum_db
  REDIS_URL: redis://redis:6379
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"
  MAILPIT_HOST: mailpit
  MAILPIT_PORT: "1025"

services:
  app:
    image: ${VELLUM_PROJECT:-vellum}-app:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
    labels:
      <<: *vellum-labels
      com.vellum.service: app
    env_file: .env
    environment:
      <<: *app-env
      PORT: "5173"
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      clamav:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  worker:
    image: ${VELLUM_PROJECT:-vellum}-worker:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
        VELLUM_SERVICE: worker
    labels:
      <<: *vellum-labels
      com.vellum.service: worker
    env_file: .env
    environment:
      <<: *app-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    command: ["npm", "run", "worker"]
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules

  postgres:
    image: postgres:15-alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: postgres
    environment:
      POSTGRES_DB: vellum_db
      POSTGRES_USER: vellum
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum -d vellum_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    labels:
      <<: *vellum-labels
      com.vellum.service: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin

  clamav:
    image: clamav/clamav:latest
    labels:
      <<: *vellum-labels
      com.vellum.service: clamav
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      retries: 10
      start_period: 120s

  mailpit:
    image: axllent/mailpit
    labels:
      <<: *vellum-labels
      com.vellum.service: mailpit
    ports:
      - "8025:8025"
      - "1025:1025"

  nginx:
    image: nginx:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: nginx
    ports:
      - "8080:8080"
    environment:
      VELLUM_HOST: ${VELLUM_HOST:-localhost}
      NGINX_ENTRYPOINT_LOCAL_RESOLVERS: "1"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/default.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  app_node_modules:
