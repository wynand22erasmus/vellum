# Compatible with Docker Compose and Podman Compose (see scripts/compose.sh).
# Image names and OCI labels use VELLUM_PROJECT + VELLUM_ENV from .env (see README.md).
version: "3.8"

x-vellum-project: &vellum-project ${VELLUM_PROJECT:-vellum}
x-vellum-env: &vellum-env ${VELLUM_ENV:-development}

x-vellum-labels: &vellum-labels
  com.vellum.project: *vellum-project
  com.vellum.environment: *vellum-env
  org.opencontainers.image.title: *vellum-project

x-vellum-build-args: &vellum-build-args
  VELLUM_PROJECT: *vellum-project
  VELLUM_ENV: *vellum-env
  VELLUM_SERVICE: app

x-app-env: &app-env
  DATABASE_URL: postgresql://vellum:password@postgres:5432/vellum_db
  REDIS_URL: redis://redis:6379
  MINIO_ENDPOINT: http://minio:9000
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  CLAMAV_HOST: clamav
  CLAMAV_PORT: "3310"
  MAILPIT_HOST: mailpit
  MAILPIT_PORT: "1025"

services:
  app:
    image: ${VELLUM_PROJECT:-vellum}-app:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
    labels:
      <<: *vellum-labels
      com.vellum.service: app
    env_file: .env
    environment:
      <<: *app-env
      PORT: "5173"
    ports:
      - "${APP_HOST_PORT:-8573}:5173"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_logs:/app/logs
    depends_on:
      clamav:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    command: ["npm", "run", "dev:api"]

  worker:
    image: ${VELLUM_PROJECT:-vellum}-worker:${VELLUM_ENV:-development}
    build:
      context: .
      target: ${VELLUM_BUILD_TARGET:-dev}
      args:
        <<: *vellum-build-args
        VELLUM_SERVICE: worker
    labels:
      <<: *vellum-labels
      com.vellum.service: worker
    env_file: .env
    environment:
      <<: *app-env
      SFTP_ENABLED: ${SFTP_ENABLED:-true}
      SFTP_INBOX_PATH: /sftp
      SFTP_ARCHIVE_PATH: /sftp/archive
      SFTP_FAILED_PATH: /sftp/failed
      SFTP_USER: ${SFTP_USER:-partner}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
      clamav:
        condition: service_healthy
      sftp:
        condition: service_started
    command: ["npm", "run", "worker"]
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
      - app_logs:/app/logs
      - sftp_data:/sftp

  sftp:
    image: atmoz/sftp:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: sftp
    ports:
      - "${SFTP_PORT:-8522}:22"
    volumes:
      - sftp_data:/home/partner/upload
    command: partner:${SFTP_PASSWORD:-devpassword}:1001

  postgres:
    image: ${VELLUM_PROJECT:-vellum}-postgres:${VELLUM_ENV:-development}
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
      args:
        VELLUM_PROJECT: *vellum-project
        VELLUM_ENV: *vellum-env
    labels:
      <<: *vellum-labels
      com.vellum.service: postgres
    environment:
      POSTGRES_DB: vellum_db
      POSTGRES_USER: vellum
      POSTGRES_PASSWORD: password
      PRISMA_STUDIO_PORT: "5555"
    ports:
      - "${POSTGRES_HOST_PORT:-8532}:5432"
      - "${PRISMA_STUDIO_PORT:-8555}:5555"
      - "${DB_ADMIN_PORT:-8581}:8081"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./prisma:/opt/vellum-prisma/prisma:ro
      - ./prisma.config.ts:/opt/vellum-prisma/prisma.config.ts:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vellum -d vellum_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:alpine
    labels:
      <<: *vellum-labels
      com.vellum.service: redis
    ports:
      - "${REDIS_HOST_PORT:-8579}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  minio:
    image: minio/minio
    labels:
      <<: *vellum-labels
      com.vellum.service: minio
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_HOST_PORT:-8500}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-8501}:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Console subpath when embedded in the dev UI (see vite-minio-console-proxy.ts).
      MINIO_BROWSER_REDIRECT_URL: http://${VELLUM_HOST:-localhost}:${VELLUM_PUBLIC_PORT:-8580}/dev-proxy/minio-console/

  clamav:
    image: clamav/clamav:latest
    labels:
      <<: *vellum-labels
      com.vellum.service: clamav
    volumes:
      - clamav_data:/var/lib/clamav
    healthcheck:
      test: ["CMD", "clamdcheck.sh"]
      interval: 30s
      retries: 10
      start_period: 120s

  mailpit:
    image: axllent/mailpit
    labels:
      <<: *vellum-labels
      com.vellum.service: mailpit
    environment:
      MP_WEBROOT: /dev-proxy/mailpit
      # Allow dev UI proxy origin when Host cannot be preserved (dev only).
      MP_API_CORS: "http://${VELLUM_HOST:-localhost}:${VELLUM_PUBLIC_PORT:-8580},http://${VELLUM_HOST:-localhost}:${WEB_HOST_PORT:-8574},http://127.0.0.1:${WEB_HOST_PORT:-8574},http://localhost:${WEB_HOST_PORT:-8574}"
    ports:
      - "${MAILPIT_UI_HOST_PORT:-8525}:8025"
      - "${MAILPIT_SMTP_HOST_PORT:-8510}:1025"

  webhook-tester:
    image: ghcr.io/tarampampam/webhook-tester:2
    labels:
      <<: *vellum-labels
      com.vellum.service: webhook-tester
    command: ["start", "--auto-create-sessions"]
    ports:
      - "${WEBHOOK_HOST_PORT:-8590}:8080"

  web:
    image: ${VELLUM_PROJECT:-vellum}-app:${VELLUM_ENV:-development}
    labels:
      <<: *vellum-labels
      com.vellum.service: web
    env_file: .env
    environment:
      <<: *app-env
      VELLUM_API_URL: http://app:5173
    ports:
      - "${WEB_HOST_PORT:-8574}:5174"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    depends_on:
      app:
        condition: service_healthy
    command: ["npm", "run", "dev"]

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  app_node_modules:
  app_logs:
  sftp_data:
