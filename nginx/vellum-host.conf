# Vellum host reverse proxy — install on the dev machine, not in Compose.
#
# Three stages share one nginx install; each listens on its 85**/86**/87** entry port
# and forwards to matching API/UI host ports on 127.0.0.1.
#
# Install (Debian/Ubuntu):
#   sudo cp nginx/vellum-host.conf /etc/nginx/sites-available/vellum-host
#   sudo ln -sf /etc/nginx/sites-available/vellum-host /etc/nginx/sites-enabled/
#   # Set server_name below to match VELLUM_HOST in your .env, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Port map (host side):
#   dev  85** — entry :8580 → API :8573, UI :8574
#   test 86** — entry :8680 → API :8673, UI :8674
#   live 87** — entry :8780 → API :8773, UI :8774

server {
  listen 8580;
  server_name localhost;

  client_max_body_size 55m;

  location /api/ {
    proxy_pass http://127.0.0.1:8573;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /docs/ {
    proxy_pass http://127.0.0.1:8573;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://127.0.0.1:8574;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

